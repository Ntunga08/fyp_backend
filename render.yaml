## EduTrack Backend — Render deployment blueprint
## Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: edutrack-backend
    runtime: docker
    dockerfilePath: ./dockerfile
    plan: free                     # upgrade to starter/standard for production
    region: oregon                 # or frankfurt, singapore, etc.
    branch: main

    envVars:
      # Injected automatically from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: edutrack-db
          property: connectionString

      # Render generates a cryptographically secure random value on first deploy
      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: "7d"

      - key: NODE_ENV
        value: production

      # PORT is set automatically by Render — do not change this
      - key: PORT
        value: "3000"

      # ── Email ──────────────────────────────────────────────────────────────
      # Set SMTP_ENABLED=true and fill in the SMTP_* vars in the Render dashboard
      # to enable real email delivery (Gmail App Password, SendGrid, etc.)
      - key: SMTP_ENABLED
        value: "false"

      - key: SMTP_HOST
        value: smtp.gmail.com

      - key: SMTP_PORT
        value: "587"

      - key: SMTP_SECURE
        value: "false"

      - key: SMTP_USER
        value: ""                  # set in Render dashboard

      - key: SMTP_PASS
        value: ""                  # set in Render dashboard (use Gmail App Password)

      - key: EMAIL_FROM
        value: "EduTrack <noreply@edutrack.tz>"

      # Set this to your actual Render service URL after first deploy
      # e.g. https://edutrack-backend.onrender.com
      - key: APP_URL
        value: "https://edutrack-backend.onrender.com"

databases:
  - name: edutrack-db
    plan: free                     # 1 GB storage, 90-day free tier
    databaseName: edutrack
    user: edutrack_user
